services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://prosperia-openai-relay-production.up.railway.app}
      PROSPERIA_TOKEN: ${PROSPERIA_TOKEN:-}
    volumes:
      - uploads:/app/uploads

volumes:
  uploads:
